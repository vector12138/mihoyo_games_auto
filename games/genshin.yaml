# 原神自动化任务流程

# 第一步：启动相关应用
- name: 启动BetterGI工具
  type: launch_app
  app_name: bettergi
  timeout: 30

- name: 启动原神游戏
  type: launch_app
  app_name: genshin_game
  timeout: 30

- name: 检测是否有新版本弹窗
  type: launch_app
  app_name: bettergi_pop
  timeout: 30

# 第二步：处理新版本弹窗
- name: 处理新版本弹窗
  type: close_app
  app_name: bettergi_pop

# 第三步：启动一条龙任务
- name: 切换回BetterGI窗口
  type: switch_app
  app_name: bettergi

- name: 点击一条龙按钮
  type: click_control_by_properties
  properties:
    source: uia
    name: 一条龙
    class_name: TextBlock
    control_type: TextControl
  timeout: 10

- name: 等待页面切换
  type: sleep
  seconds: 10

- name: 点击运行按钮
  type: click_control_by_hierarchy
  hierarchy:
    - source: uia
      class_name: OneDragonFlowPage
      control_type: CustomControl
    - source: uia
      name: "\uF606"  # 对应Unicode字符 \uF606
      class_name: TextBlock
      control_type: TextControl
  timeout: 10

# 第四步：等待任务完成
- name: 等待一条龙任务完成（5分钟）
  type: sleep
  seconds: 300

- name: 检测一条龙是否运行完成
  type: wait_for_telegram_text
  text: "一条龙和配置组任务结束"
  sender_id: 8445448103
  timeout: 1800  # 可根据实际情况调整时间