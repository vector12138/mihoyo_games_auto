# 绝区零自动化步骤配置
- name: "启动绝区零"
  type: "launch_app"
  app_name: "zzz_game"
  timeout: 60

- name: "启动zzz-onedragen辅助工具"
  type: "launch_app"
  app_name: "zzz_onedragen"
  timeout: 60

- name: "等待辅助窗口激活"
  type: "sleep"
  seconds: 30

- name: "切换到zzz-onedragen窗口"
  type: "switch_app"
  app_name: "zzz_onedragen"

- name: "点击一条龙按钮"
  type: "click_control_by_properties"
  fail_act: "stop"
  properties: 
    source: "uia"
    name: "启动一条龙"
    class_name: PillPushButton
    control_type: CheckBoxControl
  timeout: 10

- name: "等待一条龙任务执行完成（5分钟）"
  type: "sleep"
  seconds: 300 # 可根据实际情况调整时间

- name: "检测一条龙是否运行完成"
  type: "wait_for_telegram_text"
  text: "ZZZ一条龙运行通知\n一条龙运行完成"
  sender_id: 8445448103
  timeout: 1800 # 可根据实际情况调整时间
