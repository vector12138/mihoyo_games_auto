# 全局配置
global:
  use_gpu: true                  # 是否使用GPU加速OCR
  max_retries: 3                 # 失败重试次数
  retry_delay: 1                 # 重试间隔（秒）
  click_delay: 0.2               # 点击后延迟（秒）
  auto_shutdown: false           # 任务完成后自动关机
  wol_mode: "auto"               # WOL唤醒检测模式：auto（自动检测）/force_on（强制判定为WOL）/force_off（强制判定为非WOL）

# Telegram 统一配置
telegram:
  enabled: false              # 是否启用Telegram Bridge消息监听
  api_url: "http://127.0.0.1:8080" # Telegram Bridge服务API地址
  api_key: ""                 # API密钥，和telegram-bridge-service配置的api_key一致
  listen_chat_ids: []         # 监听的聊天ID列表，为空则监听所有聊天
  poll_interval: 1            # 消息轮询间隔（秒）
  command_prefix: "/"         # 命令前缀，识别消息是否为控制命令

# 游戏通用配置
game_common:
  window_mode: fullscreen        # 窗口模式：fullscreen/windowed
  resolution: "1920x1080"        # 游戏分辨率，推荐1920x1080

# 原神配置
genshin:
  enabled: true                  # 是否启用原神自动化
  game_name: "原神"
  window_title: "原神"           # 游戏窗口标题
  
  game_path: "C:\\Program Files\\Genshin Impact\\GenshinImpact.exe"  # 游戏启动路径
  bettergi_path: "C:\\Program Files\\BetterGI\\BetterGI.exe"  # BetterGI启动路径

# 绝区零配置（多应用模式，游戏本体+zzz-onedragen辅助）
zzz:
  enabled: true                  # 是否启用多应用模式
  game_name: "绝区零(多应用)"
  # 多应用配置
  apps:
    zzz_game:
      app_name: "绝区零本体"
      window_title: "绝区零"
      app_path: "C:\\Program Files\\ZenlessZoneZero\\ZenlessZoneZero.exe"
    zzz_onedragen:
      app_name: "zzz-onedragen辅助"
      window_title: "zzz-onedragen"  # 辅助工具的窗口标题，根据实际修改
      app_path: "C:\\Program Files\\zzz-onedragen\\zzz-onedragen.exe"  # 辅助工具路径
